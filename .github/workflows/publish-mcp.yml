name: Publish tuma250-mcp to PyPI

on:
  push:
    tags:
      - "tuma250-mcp/v*" # trigger on tags like tuma250-mcp/v0.1.0

jobs:
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read # required for actions/checkout on private repos
      id-token: write # required for PyPI trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project and dev dependencies
        run: uv sync --extra dev

      - name: Assert tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#tuma250-mcp/v}"
          PKG_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Patch README links for PyPI
        run: uvx mdremotifier -i README.md -o README.md --url-prefix "https://github.com/Yann-J/tuma250_mcp/main/" --img-url-prefix "https://raw.githubusercontent.com/Yann-J/tuma250_mcp/main/"

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}
